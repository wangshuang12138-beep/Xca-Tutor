name: Build macOS App

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Show environment
      run: |
        echo "=== Swift Version ==="
        swift --version
        echo "=== Xcode Version ==="
        xcodebuild -version
    
    - name: Resolve dependencies
      run: swift package resolve
    
    - name: Build with verbose output
      run: |
        swift build -c release -v 2>&1 | tee build.log
    
    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
      if: always()
    
    - name: Check build products
      run: |
        echo "=== Checking build products ==="
        ls -la .build/release/ || true
        find .build -name "XcaTutor" -type f 2>/dev/null || true
    
    - name: Create Info.plist
      run: |
        mkdir -p XcaTutor.app/Contents
        cat > XcaTutor.app/Contents/Info.plist << 'PLISTEOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>XcaTutor</string>
            <key>CFBundleIdentifier</key>
            <string>com.xca.tutor</string>
            <key>CFBundleName</key>
            <string>Xca Tutor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSMicrophoneUsageDescription</key>
            <string>Need microphone for voice practice</string>
        </dict>
        </plist>
        PLISTEOF
    
    - name: Create App Bundle
      run: |
        if [ -f .build/release/XcaTutor ]; then
          mkdir -p XcaTutor.app/Contents/MacOS
          cp .build/release/XcaTutor XcaTutor.app/Contents/MacOS/
          find .build/release -name "*.dylib" -exec cp {} XcaTutor.app/Contents/MacOS/ \; 2>/dev/null || true
          chmod +x XcaTutor.app/Contents/MacOS/XcaTutor
          zip -r XcaTutor-macOS.zip XcaTutor.app
          echo "Created XcaTutor-macOS.zip"
        else
          echo "Build failed - XcaTutor binary not found"
          echo "=== Build log tail ==="
          tail -100 build.log
          exit 1
        fi
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XcaTutor-macOS
        path: XcaTutor-macOS.zip
      if: always()
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master' && success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v0.1.0-${{ github.run_number }}
        name: Xca Tutor v0.1.0 Build ${{ github.run_number }}
        files: XcaTutor-macOS.zip
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
