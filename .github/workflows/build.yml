name: Build macOS App

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
    
    - name: Show Swift version
      run: swift --version
    
    - name: Cache Swift packages
      uses: actions/cache@v3
      with:
        path: .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    
    - name: Resolve dependencies
      run: swift package resolve
    
    - name: Build Debug
      run: swift build -v 2>&1
      continue-on-error: true
    
    - name: Build Release
      run: swift build -c release -v 2>&1
      continue-on-error: true
    
    - name: Check build products
      run: |
        ls -la .build/debug/ 2>/dev/null || true
        ls -la .build/release/ 2>/dev/null || true
    
    - name: Create App Bundle
      if: success()
      run: |
        mkdir -p XcaTutor.app/Contents/MacOS
        mkdir -p XcaTutor.app/Contents/Resources
        mkdir -p XcaTutor.app/Contents/Frameworks
        
        # 复制可执行文件
        if [ -f .build/release/XcaTutor ]; then
          cp .build/release/XcaTutor XcaTutor.app/Contents/MacOS/
        elif [ -f .build/debug/XcaTutor ]; then
          cp .build/debug/XcaTutor XcaTutor.app/Contents/MacOS/
        fi
        
        # 查找并复制依赖库
        find .build/release -name "*.dylib" -exec cp {} XcaTutor.app/Contents/Frameworks/ \; 2>/dev/null || true
        find .build/debug -name "*.dylib" -exec cp {} XcaTutor.app/Contents/Frameworks/ \; 2>/dev/null || true
        
        # 创建 Info.plist
        cat > XcaTutor.app/Contents/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>XcaTutor</string>
            <key>CFBundleIdentifier</key>
            <string>com.xca.tutor</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Xca Tutor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSMicrophoneUsageDescription</key>
            <string>需要麦克风权限进行语音练习</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        # 创建 PkgInfo
        echo "APPL????" > XcaTutor.app/Contents/PkgInfo
        
        # 设置权限
        chmod +x XcaTutor.app/Contents/MacOS/XcaTutor 2>/dev/null || true
    
    - name: Package
      run: |
        zip -r XcaTutor-v0.1.0-macOS.zip XcaTutor.app || true
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XcaTutor-macOS
        path: XcaTutor-v0.1.0-macOS.zip
        retention-days: 30
      if: always()
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master' && success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v0.1.0-build-${{ github.run_number }}
        name: Xca Tutor v0.1.0 Build ${{ github.run_number }}
        files: XcaTutor-v0.1.0-macOS.zip
        draft: false
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

