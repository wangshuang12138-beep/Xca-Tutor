name: Build macOS App

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Show environment
      run: |
        echo "=== Swift Version ==="
        swift --version
        echo "=== Xcode Version ==="
        xcodebuild -version
        echo "=== Current Directory ==="
        pwd
        ls -la
    
    - name: Clean and Build
      run: |
        rm -rf .build
        swift package resolve
        swift build 2>&1 | tee build.log
      continue-on-error: true
    
    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
      if: always()
    
    - name: Check if build succeeded
      run: |
        if [ -f .build/debug/XcaTutor ]; then
          echo "Build succeeded!"
          ls -la .build/debug/
        else
          echo "Build failed - checking log..."
          cat build.log | tail -100
          exit 1
        fi
    
    - name: Create App Bundle
      run: |
        mkdir -p XcaTutor.app/Contents/MacOS
        mkdir -p XcaTutor.app/Contents/Resources
        mkdir -p XcaTutor.app/Contents/Frameworks
        
        # 复制可执行文件
        cp .build/debug/XcaTutor XcaTutor.app/Contents/MacOS/
        
        # 查找并复制依赖库
        find .build/debug -name "*.dylib" -exec cp {} XcaTutor.app/Contents/Frameworks/ \; 2>/dev/null || true
        
        # 创建 Info.plist
        cat > XcaTutor.app/Contents/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>XcaTutor</string>
            <key>CFBundleIdentifier</key>
            <string>com.xca.tutor</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Xca Tutor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSMicrophoneUsageDescription</key>
            <string>Need microphone for voice practice</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        echo "APPL????" > XcaTutor.app/Contents/PkgInfo
        chmod +x XcaTutor.app/Contents/MacOS/XcaTutor
        
        echo "=== App Bundle Created ==="
        ls -la XcaTutor.app/Contents/MacOS/
    
    - name: Package App
      run: zip -r XcaTutor-macOS.zip XcaTutor.app
    
    - name: Upload App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XcaTutor-app
        path: XcaTutor-macOS.zip
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v0.1.0-${{ github.run_number }}
        name: Xca Tutor v0.1.0 Build ${{ github.run_number }}
        files: XcaTutor-macOS.zip
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
